<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Projects</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

/* Title */
h1 {
    font-size: 2.8rem;
    margin-bottom: 40px;
}

/* Container */
.container {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

/* Card */
.card {
    width: 260px;
    padding: 25px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    text-align: center;
    transition: all 0.3s ease;
    position: relative;
}

/* Glow border */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    padding: 1.5px;
    background: linear-gradient(120deg, #00c6ff, #ff00c8, #00ff88);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}

/* Hover */
.card:hover {
    transform: translateY(-10px) scale(1.04);
}

/* Title */
.card h2 {
    margin-bottom: 10px;
}

/* Text */
.card p {
    font-size: 0.9rem;
    opacity: 0.75;
    margin-bottom: 20px;
}

/* Button */
.btn {
    display: inline-block;
    padding: 12px 22px;
    border-radius: 8px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    text-decoration: none;
    font-size: 0.95rem;
    transition: 0.3s;
    box-shadow: 0 0 10px rgba(0,198,255,0.7);
}

/* Button hover */
.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px rgba(0,198,255,1);
}

/* Responsive */
@media (max-width: 600px) {
    h1 {
        font-size: 2rem;
    }
    .card {
        width: 200px;
    }
}
</style>
</head>

<body>

<h1>🚀 My Projects</h1>

<div class="container">

    <div class="card">
        <h2>🧮 Calculator</h2>
        <!-- <p>Perform fast and accurate calculations</p> -->
        <a href="Calculator-Pro.html" class="btn">Open</a>
    </div>

    <div class="card">
        <h2>🎮 Quiz Game</h2>
        <!-- <p>Test your knowledge with fun quizzes</p> -->
        <a href="QuizGame.html" class="btn">Play</a>
    </div>

</div>

</body>
</html>
