<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Web Projects</title>

<style>

/* Page styling */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a0a0f, #121826);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    text-align: center;
}

/* Title */
h1 {
    color: #00ff88;
    margin-bottom: 40px;
    font-size: 2.5rem;
    letter-spacing: 1px;
}

/* Cards layout */
.cards {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
    justify-content: center;
}

/* Card */
.card {
    position: relative;
    width: 230px;
    padding: 25px;
    border-radius: 15px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    text-align: center;
    transition: 0.3s;
    overflow: hidden;
}

/* Neon border effect */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 15px;
    padding: 1.5px;
    background: linear-gradient(45deg, #00ff88, #00c6ff, #ff00c8);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;

    pointer-events: none; /* important */
}

/* Hover effect */
.card:hover {
    transform: translateY(-8px) scale(1.05);
}

/* Button style link */
.card a {
    display: inline-block;
    margin-top: 10px;
    padding: 12px 20px;
    border-radius: 8px;
    background: linear-gradient(45deg, #00ff88, #00c6ff);
    color: black;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

/* Button hover */
.card a:hover {
    transform: scale(1.1);
    box-shadow: 0 0 15px #00ff88;
}

</style>
</head>

<body>

<div class="container">

<h1>My Projects</h1>

<!-- Contact Book -->
<div class="card">
    <a href="QuizGame.html">Quiz Game</a>
</div>

<!-- Password Generator -->
<div class="card">
    <a href="Calculator-Pro.html">Calculator Pro</a>
</div>

</div>

</body>
</html>
