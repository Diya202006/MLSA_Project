<!--
Create the structure for an "Ultimate Quiz Game" web application.

Requirements:

Layout:
- A main heading "Ultimate Quiz Game"
- A centered quiz container (card-style)

Start Screen:
- Input field for player name
- Buttons to select difficulty (Easy, Medium, Hard)
- Start Quiz button

Quiz Screen:
- Display question text
- Display 4 options as buttons
- Show timer countdown (10 seconds)
- Show current score

Result Screen:
- Show final score
- Show message (e.g., Excellent, Good, Try Again)
- Restart Quiz button

Leaderboard:
- Section to display top scores
- Include player name and score

Structure:
- Use proper div sections with IDs:
  - start-screen
  - quiz-container
  - result-screen
  - leaderboard

Technical:
- Link external CSS file (style.css)
- Link external JavaScript file (script.js)
- Use semantic and clean HTML

Make layout simple, clean, and beginner-friendly.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Ultimate Quiz Game</h1>

    <div id="start-screen" class="card">
        <input type="text" id="player-name" placeholder="Enter your name">
        <div class="difficulty-buttons">
            <button class="difficulty-btn" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>
        <button id="start-quiz">Start Quiz</button>
    </div>

    <div id="quiz-container" class="card" style="display: none;">
        <div id="question-text"></div>
        <div id="options">
            <button class="option-btn">Option 1</button>
            <button class="option-btn">Option 2</button>
            <button class="option-btn">Option 3</button>
            <button class="option-btn">Option 4</button>
        </div>
        <div id="timer">Time: 10s</div>
        <div id="score">Score: 0</div>
    </div>

    <div id="result-screen" class="card" style="display: none;">
        <div id="final-score"></div>
        <div id="result-message"></div>
        <button id="restart-quiz">Restart Quiz</button>
    </div>

    <div id="leaderboard" class="card">
        <h2>Leaderboard</h2>
        <ul id="leaderboard-list">
            <!-- Top scores will be displayed here -->
        </ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
