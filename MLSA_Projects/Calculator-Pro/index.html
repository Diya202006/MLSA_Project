<!-- 
Create a modern calculator UI with:
- Display screen for input/output
- Buttons for digits (0-9)
- Basic operators (+, -, *, /)
- Scientific buttons (sqrt, power)
- Clear (C) and equal (=) buttons
- A section to show calculation history
- Use clean layout with grid
- Link style.css and script.js
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <button class="button" data-value="7">7</button>
            <button class="button" data-value="8">8</button>
            <button class="button" data-value="9">9</button>
            <button class="button operator" data-value="/">/</button>

            <button class="button" data-value="4">4</button>
            <button class="button" data-value="5">5</button>
            <button class="button" data-value="6">6</button>
            <button class="button operator" data-value="*">*</button>

            <button class="button" data-value="1">1</button>
            <button class="button" data-value="2">2</button>
            <button class="button" data-value="3">3</button>
            <button class="button operator" data-value="-">-</button>

            <button class="button" data-value="0">0</button>
            <button class="button operator" data-value=".">.</button>
            <button class="button operator" data-value="+">+</button>
            <button class="button equal" id="equal" data-value="=">=</button>

            <button class="button clear" id="clear" data-value="C">C</button>
            <button class="button scientific" data-value="sqrt()">√</button>
            <button class="button scientific" data-value="^">^</button>
        </div>
        <div class="history">
            <h2>Calculation History</h2>
            <ul id="history-list"></ul>
        </div>
    </div>

    <script>
        // Get references to DOM elements
const display = document.getElementById('display');
const buttons = document.querySelectorAll('.button');
const historyList = document.getElementById('history-list');
let currentInput = '';
let operator = null;
let firstOperand = null;

// Initialize display
display.textContent = '0';

// Add event listeners to buttons
buttons.forEach(button => {
    button.addEventListener('click', () => {
        const value = button.dataset.value;
        if (!isNaN(value) || value === '.') {
            // Handle number and decimal point input
            currentInput += value;
            display.textContent = currentInput;
        } else if (value === 'C') {
            // Clear the display and reset variables
            currentInput = '';
            operator = null;
            firstOperand = null;
            display.textContent = '0';
        } else if (value === '=') {
            // Perform calculation
            if (operator && firstOperand !== null && currentInput) {
                const secondOperand = parseFloat(currentInput);
                let result;
                switch (operator) {
                    case '+':
                        result = firstOperand + secondOperand;
                        break;
                    case '-':
                        result = firstOperand - secondOperand;
                        break;
                    case '*':
                        result = firstOperand * secondOperand;
                        break;
                    case '/':
                        if (secondOperand === 0) {
                            display.textContent = 'Error';
                            currentInput = '';
                            operator = null;
                            firstOperand = null;
                            return;
                        }
                        result = firstOperand / secondOperand;
                        break;
                    case '^':
                        result = Math.pow(firstOperand, secondOperand);
                        break;
                }
                display.textContent = result.toString();
                const li = document.createElement('li');
                li.textContent = `${firstOperand} ${operator} ${secondOperand} = ${result}`;
                historyList.appendChild(li);
                currentInput = result.toString();
                operator = null;
                firstOperand = null;
            }
        } else if (value === 'sqrt()') {
            // Handle square root
            if (currentInput) {
                const num = parseFloat(currentInput);
                if (num >= 0) {
                    const result = Math.sqrt(num);
                    display.textContent = result.toString();
                    const li = document.createElement('li');
                    li.textContent = `√${num} = ${result}`;
                    historyList.appendChild(li);
                    currentInput = result.toString();
                } else {
                    display.textContent = 'Error';
                    currentInput = '';
                }
            }
        } else {
            // Handle operator input
            if (currentInput) {
                if (operator && firstOperand !== null) {
                    // Calculate intermediate result
                    const secondOperand = parseFloat(currentInput);
                    let result;
                    switch (operator) {
                        case '+':
                            result = firstOperand + secondOperand;
                            break;
                        case '-':
                            result = firstOperand - secondOperand;
                            break;
                        case '*':
                            result = firstOperand * secondOperand;
                            break;
                        case '/':
                            if (secondOperand === 0) {
                                display.textContent = 'Error';
                                currentInput = '';
                                operator = null;
                                firstOperand = null;
                                return;
                            }
                            result = firstOperand / secondOperand;
                            break;
                        case '^':
                            result = Math.pow(firstOperand, secondOperand);
                            break;
                    }
                    display.textContent = result.toString();
                    const li = document.createElement('li');
                    li.textContent = `${firstOperand} ${operator} ${secondOperand} = ${result}`;
                    historyList.appendChild(li);
                    firstOperand = result;
                    currentInput = '';
                } else {
                    firstOperand = parseFloat(currentInput);
                    currentInput = '';
                }
                operator = value;
                display.textContent = '';
            }
        }
    });
});

    </script>  
</body>
</html>
