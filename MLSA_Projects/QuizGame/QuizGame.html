<!--
Create the structure for an "Ultimate Quiz Game" web application.

Requirements:

Layout:
- A main heading "Ultimate Quiz Game"
- A centered quiz container (card-style)

Start Screen:
- Input field for player name
- Buttons to select difficulty (Easy, Medium, Hard)
- Start Quiz button

Quiz Screen:
- Display question text
- Display 4 options as buttons
- Show timer countdown (10 seconds)
- Show current score

Result Screen:
- Show final score
- Show message (e.g., Excellent, Good, Try Again)
- Restart Quiz button

Leaderboard:
- Section to display top scores
- Include player name and score

Structure:
- Use proper div sections with IDs:
  - start-screen
  - quiz-container
  - result-screen
  - leaderboard

Technical:
- Link external CSS file (style.css)
- Link external JavaScript file (script.js)
- Use semantic and clean HTML

Make layout simple, clean, and beginner-friendly.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Quiz Game</title>
    <style>
       /* 
Design a modern UI for the "Ultimate Quiz Game".

Requirements:

General:
- Center all content vertically and horizontally
- Use a soft gradient background
- Use clean font (Arial or sans-serif)

Container:
- Card-style design
- Rounded corners
- Box shadow for depth
- Padding and spacing

Buttons:
- Stylish buttons with hover effects
- Smooth transitions
- Rounded edges
- Different colors for:
  - Normal
  - Hover
  - Correct (green)
  - Wrong (red)

Text:
- Heading large and centered
- Question text readable and spaced

Timer:
- Highlight timer (red or bold)

Score:
- Display clearly

Leaderboard:
- Clean list style
- Spaced items

Responsive:
- Mobile-friendly layout
- Adjust font and spacing

Extra:
- Add small animations (fade, scale)
- Keep design neat and consistent

Make CSS structured and beginner-friendly.
*/
body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 20px;
}

h1 {
    font-size: 2.5em;
    margin-bottom: 20px;
    color: #333;
}

.card {
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    padding: 30px;
    width: 100%;
    max-width: 500px;
    text-align: center;
    margin-bottom: 20px;
    animation: fadeIn 0.5s ease-in;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Start Screen */
#player-name {
    width: 100%;
    padding: 10px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 1em;
}

.difficulty-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.difficulty-btn {
    background-color: #007BFF;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
    font-size: 1em;
}

.difficulty-btn:hover, .difficulty-btn:focus {
    background-color: #0056b3;
    transform: scale(1.05);
    outline: none;
}

#start-quiz {
    background-color: #28a745;
    color: white;
    border: none;
    padding: 12px 24px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
    font-size: 1.1em;
}

#start-quiz:hover {
    background-color: #218838;
    transform: scale(1.05);
}

/* Quiz Container */
#question-text {
    font-size: 1.3em;
    margin-bottom: 20px;
    color: #333;
}

#options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
}

.option-btn {
    background-color: #f8f9fa;
    color: #333;
    border: 1px solid #ccc;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
    font-size: 1em;
}

.option-btn:hover {
    background-color: #e9ecef;
    transform: scale(1.02);
}

.option-btn.correct {
    background-color: #28a745;
    color: white;
}

.option-btn.wrong {
    background-color: #dc3545;
    color: white;
}

#timer {
    font-size: 1.2em;
    color: #dc3545;
    font-weight: bold;
    margin-bottom: 10px;
}

#score {
    font-size: 1.1em;
    color: #333;
}

/* Result Screen */
#final-score {
    font-size: 1.5em;
    margin-bottom: 10px;
    color: #333;
}

#result-message {
    font-size: 1.2em;
    margin-bottom: 20px;
    color: #555;
}

#restart-quiz {
    background-color: #ffc107;
    color: #333;
    border: none;
    padding: 12px 24px;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease, transform 0.2s ease;
    font-size: 1.1em;
}

#restart-quiz:hover {
    background-color: #e0a800;
    transform: scale(1.05);
}

/* Leaderboard */
#leaderboard h2 {
    margin-bottom: 15px;
    color: #333;
}

#leaderboard-list {
    list-style: none;
    padding: 0;
}

#leaderboard-list li {
    background: #f8f9fa;
    margin: 5px 0;
    padding: 10px;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
}

/* Responsive */
@media (max-width: 600px) {
    h1 {
        font-size: 2em;
    }
    .card {
        padding: 20px;
        max-width: 90%;
    }
    #options {
        grid-template-columns: 1fr;
    }
    .difficulty-buttons {
        flex-direction: column;
    }
}
      </style>
</head>
<body>
    <h1>Ultimate Quiz Game</h1>

    <div id="start-screen" class="card">
        <input type="text" id="player-name" placeholder="Enter your name">
        <div class="difficulty-buttons">
            <button class="difficulty-btn" data-difficulty="easy">Easy</button>
            <button class="difficulty-btn" data-difficulty="medium">Medium</button>
            <button class="difficulty-btn" data-difficulty="hard">Hard</button>
        </div>
        <button id="start-quiz">Start Quiz</button>
    </div>

    <div id="quiz-container" class="card" style="display: none;">
        <div id="question-text"></div>
        <div id="options">
            <button class="option-btn">Option 1</button>
            <button class="option-btn">Option 2</button>
            <button class="option-btn">Option 3</button>
            <button class="option-btn">Option 4</button>
        </div>
        <div id="timer">Time: 10s</div>
        <div id="score">Score: 0</div>
    </div>

    <div id="result-screen" class="card" style="display: none;">
        <div id="final-score"></div>
        <div id="result-message"></div>
        <button id="restart-quiz">Restart Quiz</button>
    </div>

    <div id="leaderboard" class="card">
        <h2>Leaderboard</h2>
        <ul id="leaderboard-list">
            <!-- Top scores will be displayed here -->
        </ul>
    </div>

    <script>/*
Create the logic for an "Ultimate Quiz Game" using JavaScript.

Features:

Core:
- Store multiple questions in an array of objects
- Each question should have:
  - question
  - options (4)
  - correct answer
  - difficulty level

Game Flow:
- Start game after user selects difficulty
- Show one question at a time
- Check user answer
- Update score

Advanced:
- Timer (10 seconds per question using setInterval)
- Auto move to next question when time ends
- Randomize question order (shuffle)
- Filter questions based on difficulty

Leaderboard:
- Store player name and score using localStorage
- Display top scores

UI Interaction:
- Show/hide different screens:
  - start screen
  - quiz screen
  - result screen
- Update DOM dynamically

Extra:
- Restart quiz functionality
- Input validation (player name required)

Code Style:
- Use functions (startQuiz, showQuestion, checkAnswer, nextQuestion)
- Keep code modular and readable
- Add comments for each section

Make code beginner-friendly and well-structured.
*/
// Quiz questions array
const questions = [
    {
        question: "What is the capital of France?",
        options: ["Berlin", "Madrid", "Paris", "Rome"],
        correctAnswer: "Paris",
        difficulty: "easy"
    },
    {
        question: "What is the largest planet in our solar system?",
        options: ["Earth", "Jupiter", "Mars", "Saturn"],
        correctAnswer: "Jupiter",
        difficulty: "medium"
    },
    {
        question: "What is the chemical symbol for gold?",
        options: ["Au", "Ag", "Fe", "Pb"],
        correctAnswer: "Au",
        difficulty: "hard"
    },
    {
        question: "Which programming language is known as the 'mother of all languages'?",
        options: ["C", "Python", "Java", "Assembly"],
        correctAnswer: "C",
        difficulty: "medium"
    },
    {
        question: "What does HTML stand for?",
        options: ["HyperText Markup Language", "High Tech Modern Language", "Home Tool Markup Language", "Hyperlink and Text Markup Language"],
        correctAnswer: "HyperText Markup Language",
        difficulty: "easy"
    },
    {
        question: "What is 2 + 2?",
        options: ["3", "4", "5", "6"],
        correctAnswer: "4",
        difficulty: "easy"
    },
    {
        question: "Which planet is known as the Red Planet?",
        options: ["Venus", "Mars", "Jupiter", "Saturn"],
        correctAnswer: "Mars",
        difficulty: "easy"
    },
    {
        question: "What is the square root of 16?",
        options: ["2", "4", "6", "8"],
        correctAnswer: "4",
        difficulty: "medium"
    },
    {
        question: "Who painted the Mona Lisa?",
        options: ["Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Michelangelo"],
        correctAnswer: "Leonardo da Vinci",
        difficulty: "medium"
    },
    {
        question: "What is the chemical formula for water?",
        options: ["H2O", "CO2", "O2", "NaCl"],
        correctAnswer: "H2O",
        difficulty: "easy"
    },
    {
        question: "Which element has the atomic number 1?",
        options: ["Helium", "Hydrogen", "Lithium", "Beryllium"],
        correctAnswer: "Hydrogen",
        difficulty: "hard"
    },
    {
        question: "What is the capital of Japan?",
        options: ["Seoul", "Beijing", "Tokyo", "Bangkok"],
        correctAnswer: "Tokyo",
        difficulty: "easy"
    }
];

// Game variables
let currentQuestionIndex = 0;
let score = 0;
let timer;
let timeLeft = 10;
let selectedDifficulty = 'easy';
let playerName = '';
let leaderboard = JSON.parse(localStorage.getItem('leaderboard')) || [];
let filteredQuestions = [];

// DOM elements
const startScreen = document.getElementById('start-screen');
const quizContainer = document.getElementById('quiz-container');
const resultScreen = document.getElementById('result-screen');
const playerNameInput = document.getElementById('player-name');
const difficultyButtons = document.querySelectorAll('.difficulty-btn');
const startQuizButton = document.getElementById('start-quiz');
const questionText = document.getElementById('question-text');
const options = document.getElementById('options');
const timerDisplay = document.getElementById('timer');
const scoreDisplay = document.getElementById('score');
const finalScore = document.getElementById('final-score');
const resultMessage = document.getElementById('result-message');
const restartQuizButton = document.getElementById('restart-quiz');
const leaderboardList = document.getElementById('leaderboard-list');

// Initialize
displayLeaderboard();

// Event listeners
difficultyButtons.forEach(button => {
    button.addEventListener('click', () => {
        selectedDifficulty = button.dataset.difficulty;
        difficultyButtons.forEach(btn => btn.classList.remove('selected'));
        button.classList.add('selected');
    });
});

startQuizButton.addEventListener('click', startQuiz);

restartQuizButton.addEventListener('click', restartQuiz);

// Functions
function startQuiz() {
    playerName = playerNameInput.value.trim();
    if (!playerName) {
        alert('Please enter your name!');
        return;
    }

    // Filter and shuffle questions
    filteredQuestions = questions.filter(q => q.difficulty === selectedDifficulty);
    shuffleArray(filteredQuestions);

    // Reset game state
    currentQuestionIndex = 0;
    score = 0;
    timeLeft = 10;

    // Hide start screen, show quiz
    startScreen.style.display = 'none';
    quizContainer.style.display = 'block';
    resultScreen.style.display = 'none';

    showQuestion();
    startTimer();
}

function showQuestion() {
    if (currentQuestionIndex >= filteredQuestions.length) {
        showResult();
        return;
    }

    const question = filteredQuestions[currentQuestionIndex];
    questionText.textContent = question.question;
    options.innerHTML = '';

    question.options.forEach((option, index) => {
        const button = document.createElement('button');
        button.className = 'option-btn';
        button.textContent = option;
        button.addEventListener('click', () => checkAnswer(option, button));
        options.appendChild(button);
    });

    updateScore();
}

function checkAnswer(selectedAnswer, button) {
    const question = filteredQuestions[currentQuestionIndex];
    const optionButtons = document.querySelectorAll('.option-btn');

    // Disable all buttons
    optionButtons.forEach(btn => btn.disabled = true);

    if (selectedAnswer === question.correctAnswer) {
        score++;
        button.classList.add('correct');
    } else {
        button.classList.add('wrong');
        // Highlight correct answer
        optionButtons.forEach(btn => {
            if (btn.textContent === question.correctAnswer) {
                btn.classList.add('correct');
            }
        });
    }

    clearInterval(timer);
    setTimeout(() => {
        currentQuestionIndex++;
        showQuestion();
        if (currentQuestionIndex < filteredQuestions.length) {
            timeLeft = 10;
            startTimer();
        }
    }, 2000);
}

function startTimer() {
    timerDisplay.textContent = `Time: ${timeLeft}s`;
    timer = setInterval(() => {
        timeLeft--;
        timerDisplay.textContent = `Time: ${timeLeft}s`;
        if (timeLeft <= 0) {
            clearInterval(timer);
            // Auto move to next question
            const optionButtons = document.querySelectorAll('.option-btn');
            optionButtons.forEach(btn => {
                if (btn.textContent === filteredQuestions[currentQuestionIndex].correctAnswer) {
                    btn.classList.add('correct');
                }
                btn.disabled = true;
            });
            setTimeout(() => {
                currentQuestionIndex++;
                showQuestion();
                if (currentQuestionIndex < filteredQuestions.length) {
                    timeLeft = 10;
                    startTimer();
                }
            }, 2000);
        }
    }, 1000);
}

function updateScore() {
    scoreDisplay.textContent = `Score: ${score}`;
}

function showResult() {
    clearInterval(timer);
    quizContainer.style.display = 'none';
    resultScreen.style.display = 'block';

    finalScore.textContent = `Final Score: ${score}/${filteredQuestions.length}`;
    resultMessage.textContent = getResultMessage(score, filteredQuestions.length);

    updateLeaderboard();
    displayLeaderboard();
}

function getResultMessage(score, total) {
    const percentage = (score / total) * 100;
    if (percentage >= 90) return 'Excellent! You are a quiz master!';
    if (percentage >= 70) return 'Good job! Well done!';
    if (percentage >= 50) return 'Not bad! Keep practicing!';
    return 'Try again! You can do better!';
}

function updateLeaderboard() {
    leaderboard.push({ name: playerName, score: score, total: filteredQuestions.length });
    leaderboard.sort((a, b) => b.score - a.score);
    leaderboard = leaderboard.slice(0, 5); // Keep top 5
    localStorage.setItem('leaderboard', JSON.stringify(leaderboard));
}

function displayLeaderboard() {
    leaderboardList.innerHTML = '';
    leaderboard.forEach(entry => {
        const li = document.createElement('li');
        li.textContent = `${entry.name}: ${entry.score}/${entry.total}`;
        leaderboardList.appendChild(li);
    });
}

function restartQuiz() {
    startScreen.style.display = 'block';
    quizContainer.style.display = 'none';
    resultScreen.style.display = 'none';
    playerNameInput.value = '';
    difficultyButtons.forEach(btn => btn.classList.remove('selected'));
    selectedDifficulty = 'easy';
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}
    </script>
</body>
</html>
